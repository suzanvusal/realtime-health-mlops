repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v3.4.0  # Use the ref you want to point at
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-added-large-files
      - id: check-merge-conflict

  - repo: https://github.com/psf/black
    rev: 22.3.0  # Use the ref you want to point at
    hooks:
      - id: black
        language_version: python3

  - repo: https://github.com/pre-commit/mirrors-isort
    rev: v5.10.1  # Use the ref you want to point at
    hooks:
      - id: isort
        name: isort
        args: ["--profile", "black"]

  - repo: https://github.com/pre-commit/mirrors-flake8
    rev: v4.0.1  # Use the ref you want to point at
    hooks:
      - id: flake8
        additional_dependencies: [flake8-bugbear]

  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v0.910  # Use the ref you want to point at
    hooks:
      - id: mypy

  - repo: https://github.com/pre-commit/pre-commit
    rev: v2.18.1  # Use the ref you want to point at
    hooks:
      - id: check-merge-conflict
      - id: check-added-large-files

  - repo: https://github.com/pre-commit/mirrors-pylint
    rev: v2.12.2  # Use the ref you want to point at
    hooks:
      - id: pylint
        additional_dependencies: [pylint-django]
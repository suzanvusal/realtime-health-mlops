training_config:
  data_source:
    type: "kafka"
    topic: "health_data"
    bootstrap_servers: "localhost:9092"
    group_id: "health_monitoring_group"

  feature_engineering:
    methods:
      - "normalize"
      - "one_hot_encode"
      - "impute_missing_values"
    normalization_params:
      method: "min_max"
      range: [0, 1]
    one_hot_encode_columns:
      - "gender"
      - "smoking_status"
    impute_strategy: "mean"

  train_val_split:
    test_size: 0.2
    random_seed: 42

  model:
    type: "xgboost"
    params:
      learning_rate: 0.1
      max_depth: 5
      n_estimators: 100
      objective: "binary:logistic"

  logging:
    level: "INFO"
    log_file: "logs/training.log"

  output:
    model_path: "models/trained_model.xgb"
    feature_importance_path: "models/feature_importance.json"
    metrics_path: "metrics/training_metrics.json"

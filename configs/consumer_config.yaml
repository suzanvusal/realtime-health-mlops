consumer_config:
  kafka:
    bootstrap_servers: "localhost:9092"
    topic: "health_data"
    group_id: "health_monitoring_group"
    auto_offset_reset: "earliest"
    enable_auto_commit: true
    max_poll_records: 100
    session_timeout_ms: 15000
    heartbeat_interval_ms: 5000

  schema_registry:
    url: "http://localhost:8081"
    schema_subject: "health_data_schema"

  dead_letter_queue:
    topic: "health_data_dlq"
    max_retries: 3
    retry_delay_seconds: 10

  validation:
    enabled: true
    validation_schema: "health_data_validation_schema.json"
    validation_threshold: 0.8

logging:
  level: "INFO"
  format: "%(asctime)s - %(name)s - %(levelname)s - %(message)s"
  handlers:
    - type: "console"
    - type: "file"
      filename: "logs/consumer.log"
      max_bytes: 10485760
      backup_count: 5

metrics:
  enabled: true
  prometheus:
    endpoint: "/metrics"
    port: 8000

health_check:
  enabled: true
  interval_seconds: 30
  timeout_seconds: 5
# 11:00:59 — automated update

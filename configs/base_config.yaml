base_config.yaml:
  kafka:
    bootstrap_servers: "localhost:9092"
    topic: "health_data"
  
  redis:
    host: "localhost"
    port: 6379
    db: 0

  model:
    xgboost:
      n_estimators: 100
      max_depth: 3
      learning_rate: 0.1
      objective: "binary:logistic"

    pytorch:
      input_size: 10
      hidden_size: 5
      output_size: 1
      num_layers: 2
      dropout: 0.2

  mlflow:
    tracking_uri: "http://localhost:5000"
    experiment_name: "health_monitoring"

  fastapi:
    host: "0.0.0.0"
    port: 8000

  airflow:
    dags_folder: "/usr/local/airflow/dags"
    executor: "LocalExecutor"

  evidently:
    dashboard_url: "http://localhost:8081"
    report_path: "./reports/evidently_report.html"
apiVersion: v1
kind: Namespace
metadata:
  name: smart-health-monitoring
  labels:
    name: smart-health-monitoring
---
apiVersion: v1
kind: Secret
metadata:
  name: kafka-secret
  namespace: smart-health-monitoring
type: Opaque
data:
  username: <base64-encoded-username>
  password: <base64-encoded-password>
---
apiVersion: v1
kind: Secret
metadata:
  name: redis-secret
  namespace: smart-health-monitoring
type: Opaque
data:
  redis-password: <base64-encoded-redis-password>
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: monitoring-sa
  namespace: smart-health-monitoring
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: monitoring-role
  namespace: smart-health-monitoring
rules:
  - apiGroups: [""]
    resources: ["pods", "pods/log"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: monitoring-role-binding
  namespace: smart-health-monitoring
subjects:
  - kind: ServiceAccount
    name: monitoring-sa
    namespace: smart-health-monitoring
roleRef:
  kind: Role
  name: monitoring-role
  apiGroup: rbac.authorization.k8s.io

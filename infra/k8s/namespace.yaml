apiVersion: v1
kind: Namespace
metadata:
  name: smart-health-monitoring
  labels:
    name: smart-health-monitoring
---
apiVersion: v1
kind: Secret
metadata:
  name: kafka-secret
  namespace: smart-health-monitoring
type: Opaque
data:
  kafka-username: <base64-encoded-username>
  kafka-password: <base64-encoded-password>
---
apiVersion: v1
kind: Secret
metadata:
  name: redis-secret
  namespace: smart-health-monitoring
type: Opaque
data:
  redis-password: <base64-encoded-redis-password>
---
apiVersion: v1
kind: Secret
metadata:
  name: mlflow-secret
  namespace: smart-health-monitoring
type: Opaque
data:
  mlflow-tracking-uri: <base64-encoded-mlflow-uri>
  mlflow-access-key: <base64-encoded-access-key>
---
apiVersion: v1
kind: Secret
metadata:
  name: fastapi-secret
  namespace: smart-health-monitoring
type: Opaque
data:
  fastapi-secret-key: <base64-encoded-secret-key>
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: app-config
  namespace: smart-health-monitoring
data:
  KAFKA_BROKER: "kafka-broker:9092"
  REDIS_HOST: "redis-master"
  MLFLOW_TRACKING_URI: "http://mlflow:5000"
  FASTAPI_PORT: "8000"

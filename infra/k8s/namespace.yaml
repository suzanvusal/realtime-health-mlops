apiVersion: v1
kind: Namespace
metadata:
  name: smart-health-monitoring
  labels:
    name: smart-health-monitoring
---
apiVersion: v1
kind: Secret
metadata:
  name: redis-secret
  namespace: smart-health-monitoring
type: Opaque
data:
  redis-password: <base64-encoded-password>
---
apiVersion: v1
kind: Secret
metadata:
  name: kafka-secret
  namespace: smart-health-monitoring
type: Opaque
data:
  kafka-password: <base64-encoded-password>
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: app-config
  namespace: smart-health-monitoring
data:
  LOG_LEVEL: "info"
  REDIS_HOST: "redis-service"
  KAFKA_BROKER: "kafka-broker:9092"
  MLFLOW_TRACKING_URI: "http://mlflow:5000"
---
apiVersion: v1
kind: Service
metadata:
  name: redis-service
  namespace: smart-health-monitoring
spec:
  ports:
    - port: 6379
  selector:
    app: redis
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: redis-deployment
  namespace: smart-health-monitoring
spec:
  replicas: 1
  selector:
    matchLabels:
      app: redis
  template:
    metadata:
      labels:
        app: redis
    spec:
      containers:
        - name: redis
          image: redis:latest
          ports:
            - containerPort: 6379
          env:
            - name: REDIS_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: redis-secret
                  key: redis-password
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: kafka-deployment
  namespace: smart-health-monitoring
spec:
  replicas: 1
  selector:
    matchLabels:
      app: kafka
  template:
    metadata:
      labels:
        app: kafka
    spec:
      containers:
        - name: kafka
          image: wurstmeister/kafka:latest
          ports:
            - containerPort: 9092
          env:
            - name: KAFKA_ADVERTISED_LISTENERS
              value: INSIDE://kafka:9092
            - name: KAFKA_LISTENER_SECURITY_PROTOCOL_MAP
              value: INSIDE:PLAINTEXT
            - name: KAFKA_LISTENERS
              value: INSIDE://0.0.0.0:9092
            - name: KAFKA_ZOOKEEPER_CONNECT
              value: zookeeper:2181
            - name: KAFKA_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: kafka-secret
                  key: kafka-password
---
apiVersion: v1
kind: Service
metadata:
  name: kafka-service
  namespace: smart-health-monitoring
spec:
  ports:
    - port: 9092
  selector:
    app: kafka

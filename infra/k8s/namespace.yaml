apiVersion: v1
kind: Namespace
metadata:
  name: smart-health-monitoring
  labels:
    name: smart-health-monitoring
---
apiVersion: v1
kind: Secret
metadata:
  name: kafka-secret
  namespace: smart-health-monitoring
type: Opaque
data:
  username: <base64_encoded_username>
  password: <base64_encoded_password>
---
apiVersion: v1
kind: Secret
metadata:
  name: redis-secret
  namespace: smart-health-monitoring
type: Opaque
data:
  redis-password: <base64_encoded_redis_password>
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: app-config
  namespace: smart-health-monitoring
data:
  KAFKA_BROKER: "kafka:9092"
  REDIS_HOST: "redis"
  REDIS_PORT: "6379"
  MLFLOW_TRACKING_URI: "http://mlflow:5000"
  FASTAPI_HOST: "0.0.0.0"
  FASTAPI_PORT: "8000"
---
apiVersion: v1
kind: Service
metadata:
  name: health-monitoring-service
  namespace: smart-health-monitoring
spec:
  selector:
    app: health-monitoring
  ports:
    - protocol: TCP
      port: 80
      targetPort: 8000
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: health-monitoring-deployment
  namespace: smart-health-monitoring
spec:
  replicas: 3
  selector:
    matchLabels:
      app: health-monitoring
  template:
    metadata:
      labels:
        app: health-monitoring
    spec:
      containers:
        - name: health-monitoring
          image: your-docker-repo/health-monitoring:latest
          ports:
            - containerPort: 8000
          env:
            - name: KAFKA_BROKER
              valueFrom:
                configMapKeyRef:
                  name: app-config
                  key: KAFKA_BROKER
            - name: REDIS_HOST
              valueFrom:
                configMapKeyRef:
                  name: app-config
                  key: REDIS_HOST
            - name: REDIS_PORT
              valueFrom:
                configMapKeyRef:
                  name: app-config
                  key: REDIS_PORT
            - name: MLFLOW_TRACKING_URI
              valueFrom:
                configMapKeyRef:
                  name: app-config
                  key: MLFLOW_TRACKING_URI
            - name: FASTAPI_HOST
              valueFrom:
                configMapKeyRef:
                  name: app-config
                  key: FASTAPI_HOST
            - name: FASTAPI_PORT
              valueFrom:
                configMapKeyRef:
                  name: app-config
                  key: FASTAPI_PORT
          volumeMounts:
            - name: kafka-secret
              mountPath: /etc/secrets
              readOnly: true
            - name: redis-secret
              mountPath: /etc/secrets
              readOnly: true
      volumes:
        - name: kafka-secret
          secret:
            secretName: kafka-secret
        - name: redis-secret
          secret:
            secretName: redis-secret

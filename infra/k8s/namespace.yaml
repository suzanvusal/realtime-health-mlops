apiVersion: v1
kind: Namespace
metadata:
  name: smart-health-monitoring
  labels:
    name: smart-health-monitoring
---
apiVersion: v1
kind: Secret
metadata:
  name: kafka-secret
  namespace: smart-health-monitoring
type: Opaque
data:
  kafka-password: <base64_encoded_kafka_password>
---
apiVersion: v1
kind: Secret
metadata:
  name: redis-secret
  namespace: smart-health-monitoring
type: Opaque
data:
  redis-password: <base64_encoded_redis_password>
---
apiVersion: v1
kind: Secret
metadata:
  name: mlflow-secret
  namespace: smart-health-monitoring
type: Opaque
data:
  mlflow-tracking-uri: <base64_encoded_mlflow_tracking_uri>
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: app-config
  namespace: smart-health-monitoring
data:
  KAFKA_BOOTSTRAP_SERVERS: "kafka:9092"
  REDIS_HOST: "redis"
  MLFLOW_TRACKING_URI: "http://mlflow:5000"
  EVIDENTLY_API_URL: "http://evidently:8080"
---
apiVersion: v1
kind: Service
metadata:
  name: health-monitoring-service
  namespace: smart-health-monitoring
spec:
  selector:
    app: health-monitoring
  ports:
    - protocol: TCP
      port: 80
      targetPort: 8000
  type: ClusterIP
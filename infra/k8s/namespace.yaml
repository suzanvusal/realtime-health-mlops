apiVersion: v1
kind: Namespace
metadata:
  name: smart-health-monitoring
  labels:
    name: smart-health-monitoring
---
apiVersion: v1
kind: Secret
metadata:
  name: redis-secret
  namespace: smart-health-monitoring
type: Opaque
data:
  redis-password: <base64-encoded-password>
---
apiVersion: v1
kind: Secret
metadata:
  name: kafka-secret
  namespace: smart-health-monitoring
type: Opaque
data:
  kafka-password: <base64-encoded-password>
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: app-config
  namespace: smart-health-monitoring
data:
  KAFKA_BROKER: "kafka:9092"
  REDIS_HOST: "redis:6379"
  MLFLOW_TRACKING_URI: "http://mlflow:5000"
  MODEL_VERSION: "v1"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: smart-health-api
  namespace: smart-health-monitoring
spec:
  replicas: 3
  selector:
    matchLabels:
      app: smart-health-api
  template:
    metadata:
      labels:
        app: smart-health-api
    spec:
      containers:
        - name: smart-health-api
          image: your-docker-repo/smart-health-api:latest
          ports:
            - containerPort: 80
          env:
            - name: REDIS_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: redis-secret
                  key: redis-password
            - name: KAFKA_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: kafka-secret
                  key: kafka-password
---
apiVersion: v1
kind: Service
metadata:
  name: smart-health-api
  namespace: smart-health-monitoring
spec:
  type: ClusterIP
  ports:
    - port: 80
      targetPort: 80
  selector:
    app: smart-health-api

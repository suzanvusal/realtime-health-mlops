apiVersion: v1
kind: Namespace
metadata:
  name: smart-health-monitoring
  labels:
    name: smart-health-monitoring
---
apiVersion: v1
kind: Secret
metadata:
  name: kafka-secret
  namespace: smart-health-monitoring
type: Opaque
data:
  kafka-username: <base64-encoded-username>
  kafka-password: <base64-encoded-password>
---
apiVersion: v1
kind: Secret
metadata:
  name: redis-secret
  namespace: smart-health-monitoring
type: Opaque
data:
  redis-password: <base64-encoded-password>
---
apiVersion: v1
kind: Secret
metadata:
  name: mlflow-secret
  namespace: smart-health-monitoring
type: Opaque
data:
  mlflow-tracking-uri: <base64-encoded-tracking-uri>
  mlflow-username: <base64-encoded-username>
  mlflow-password: <base64-encoded-password>
---
apiVersion: v1
kind: Secret
metadata:
  name: pytorch-secret
  namespace: smart-health-monitoring
type: Opaque
data:
  pytorch-model-path: <base64-encoded-model-path>
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: smart-health-monitoring-sa
  namespace: smart-health-monitoring
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: smart-health-monitoring-role
  namespace: smart-health-monitoring
rules:
  - apiGroups: [""]
    resources: ["pods", "pods/log", "secrets"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: smart-health-monitoring-rolebinding
  namespace: smart-health-monitoring
subjects:
  - kind: ServiceAccount
    name: smart-health-monitoring-sa
    namespace: smart-health-monitoring
roleRef:
  kind: Role
  name: smart-health-monitoring-role
  apiGroup: rbac.authorization.k8s.io
